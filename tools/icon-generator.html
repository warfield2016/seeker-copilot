<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seeker Copilot Icon Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 {
            font-size: 16px; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button {
            background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px;
            border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%;
            transition: all 0.2s ease; margin-bottom: 8px;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container {
            width: 100%; max-width: 600px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: white;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); padding: 100px; }
        .export-info { font-size: 11px; color: var(--anthropic-mid-gray); margin-top: 8px; line-height: 1.4; }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Vigilant Cipher</h1>
            <div class="subtitle">Shield + Eye icon generator for Seeker Copilot. Geometric guardianship in Solana colors.</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="7777" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <!-- Parameters -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Shield Points</label>
                    <div class="slider-container">
                        <input type="range" id="shieldPoints" min="5" max="8" step="1" value="6" oninput="updateParam('shieldPoints', this.value)">
                        <span class="value-display" id="shieldPoints-value">6</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Shield Roundness</label>
                    <div class="slider-container">
                        <input type="range" id="shieldRound" min="0.1" max="0.9" step="0.05" value="0.45" oninput="updateParam('shieldRound', this.value)">
                        <span class="value-display" id="shieldRound-value">0.45</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Eye Rings</label>
                    <div class="slider-container">
                        <input type="range" id="eyeRings" min="3" max="12" step="1" value="7" oninput="updateParam('eyeRings', this.value)">
                        <span class="value-display" id="eyeRings-value">7</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Glow Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="glowIntensity" min="0.2" max="1.5" step="0.05" value="0.8" oninput="updateParam('glowIntensity', this.value)">
                        <span class="value-display" id="glowIntensity-value">0.8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Shield Thickness</label>
                    <div class="slider-container">
                        <input type="range" id="shieldThickness" min="4" max="20" step="1" value="10" oninput="updateParam('shieldThickness', this.value)">
                        <span class="value-display" id="shieldThickness-value">10</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Spokes</label>
                    <div class="slider-container">
                        <input type="range" id="spokes" min="0" max="24" step="2" value="12" oninput="updateParam('spokes', this.value)">
                        <span class="value-display" id="spokes-value">12</span>
                    </div>
                </div>
            </div>

            <!-- Colors -->
            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Shield (Purple)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorShield" value="#9945FF" onchange="updateColor('colorShield', this.value)">
                        <span class="color-value" id="colorShield-value">#9945FF</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Eye (Green)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorEye" value="#14F195" onchange="updateColor('colorEye', this.value)">
                        <span class="color-value" id="colorEye-value">#14F195</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Background</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorBg" value="#0D1117" onchange="updateColor('colorBg', this.value)">
                        <span class="color-value" id="colorBg-value">#0D1117</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="control-section">
                <h3>Actions</h3>
                <button class="button" onclick="exportIcon(512)">Download 512×512 (dApp Store)</button>
                <button class="button" onclick="exportIcon(1024)">Download 1024×1024 (iOS)</button>
                <button class="button secondary" onclick="exportIcon(48)">Download 48×48 (Favicon)</button>
                <div class="button-row">
                    <button class="button tertiary" onclick="resetParameters()">Reset</button>
                </div>
                <div class="export-info">Downloads save to your default Downloads folder. Use 512×512 for the Solana publisher avatar.</div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Generating icon...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 7777,
            shieldPoints: 6,
            shieldRound: 0.45,
            eyeRings: 7,
            glowIntensity: 0.8,
            shieldThickness: 10,
            spokes: 12,
            colorShield: '#9945FF',
            colorEye: '#14F195',
            colorBg: '#0D1117'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));
        let pg; // offscreen buffer for export

        function setup() {
            let canvas = createCanvas(512, 512);
            canvas.parent('canvas-container');
            pixelDensity(2);
            noLoop();
            renderIcon();
            document.querySelector('.loading').style.display = 'none';
        }

        function renderIcon() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            let cx = width / 2;
            let cy = height / 2;
            let sz = width * 0.42;

            // Background
            let bg = color(params.colorBg);
            background(bg);

            // Subtle noise texture on background
            loadPixels();
            for (let i = 0; i < pixels.length; i += 4) {
                let n = (random() - 0.5) * 8;
                pixels[i] += n;
                pixels[i+1] += n;
                pixels[i+2] += n;
            }
            updatePixels();

            let shieldCol = color(params.colorShield);
            let eyeCol = color(params.colorEye);

            // ── SHIELD GLOW (outer) ──
            push();
            drawingContext.shadowColor = params.colorShield;
            drawingContext.shadowBlur = 40 * params.glowIntensity;
            noFill();
            stroke(red(shieldCol), green(shieldCol), blue(shieldCol), 60);
            strokeWeight(params.shieldThickness + 8);
            drawShield(cx, cy, sz * 1.02);
            pop();

            // ── SHIELD BODY ──
            // Shield gradient fill
            push();
            let grd = drawingContext.createLinearGradient(cx, cy - sz, cx, cy + sz);
            grd.addColorStop(0, hexWithAlpha(params.colorShield, 0.25));
            grd.addColorStop(0.5, hexWithAlpha(params.colorShield, 0.08));
            grd.addColorStop(1, hexWithAlpha(params.colorShield, 0.15));
            drawingContext.fillStyle = grd;
            noStroke();
            drawShield(cx, cy, sz * 0.95, true);
            pop();

            // Shield outline
            push();
            noFill();
            stroke(shieldCol);
            strokeWeight(params.shieldThickness);
            strokeJoin(ROUND);
            drawShield(cx, cy, sz);
            pop();

            // Inner shield line
            push();
            noFill();
            stroke(red(shieldCol), green(shieldCol), blue(shieldCol), 80);
            strokeWeight(2);
            strokeJoin(ROUND);
            drawShield(cx, cy, sz * 0.82);
            pop();

            // ── EYE GLOW (bloom) ──
            let eyeR = sz * 0.38;
            for (let i = 6; i >= 1; i--) {
                let a = 12 * params.glowIntensity / i;
                fill(red(eyeCol), green(eyeCol), blue(eyeCol), a);
                noStroke();
                ellipse(cx, cy, eyeR * 2 + i * 20, eyeR * 2 + i * 20);
            }

            // ── SPOKES (scanning rays) ──
            if (params.spokes > 0) {
                push();
                let spokeLen = eyeR * 1.6;
                for (let i = 0; i < params.spokes; i++) {
                    let angle = (TWO_PI / params.spokes) * i + (params.seed % 100) * 0.01;
                    let x1 = cx + cos(angle) * eyeR * 0.35;
                    let y1 = cy + sin(angle) * eyeR * 0.35;
                    let x2 = cx + cos(angle) * spokeLen;
                    let y2 = cy + sin(angle) * spokeLen;

                    let grd2 = drawingContext.createLinearGradient(x1, y1, x2, y2);
                    grd2.addColorStop(0, hexWithAlpha(params.colorEye, 0.5));
                    grd2.addColorStop(1, hexWithAlpha(params.colorEye, 0));
                    drawingContext.strokeStyle = grd2;
                    drawingContext.lineWidth = 1.5;
                    drawingContext.beginPath();
                    drawingContext.moveTo(x1, y1);
                    drawingContext.lineTo(x2, y2);
                    drawingContext.stroke();
                }
                pop();
            }

            // ── CONCENTRIC EYE RINGS ──
            for (let i = params.eyeRings; i >= 1; i--) {
                let r = (eyeR / params.eyeRings) * i;
                let alpha;
                if (i === params.eyeRings) {
                    // Outermost ring - bright stroke
                    noFill();
                    stroke(red(eyeCol), green(eyeCol), blue(eyeCol), 180);
                    strokeWeight(2.5);
                    ellipse(cx, cy, r * 2, r * 2);
                } else if (i <= 2) {
                    // Inner rings - solid fills
                    alpha = i === 1 ? 255 : 200;
                    fill(red(eyeCol), green(eyeCol), blue(eyeCol), alpha);
                    noStroke();
                    ellipse(cx, cy, r * 2, r * 2);
                } else {
                    // Middle rings - semi-transparent
                    alpha = map(i, 2, params.eyeRings, 120, 30);
                    noFill();
                    stroke(red(eyeCol), green(eyeCol), blue(eyeCol), alpha);
                    strokeWeight(1.5);
                    ellipse(cx, cy, r * 2, r * 2);
                }
            }

            // ── PUPIL (bright center) ──
            let pupilR = eyeR * 0.12;
            // White-hot center
            fill(255, 255, 255, 200);
            noStroke();
            ellipse(cx, cy, pupilR * 2, pupilR * 2);

            // Green corona around pupil
            noFill();
            stroke(red(eyeCol), green(eyeCol), blue(eyeCol), 255);
            strokeWeight(2);
            ellipse(cx, cy, pupilR * 3.5, pupilR * 3.5);

            // ── CORNER ACCENTS (subtle geometric detail) ──
            push();
            stroke(red(shieldCol), green(shieldCol), blue(shieldCol), 40);
            strokeWeight(1);
            let accR = sz * 0.15;
            // Top corners of shield
            let topY = cy - sz * 0.85;
            line(cx - accR, topY, cx + accR, topY);
            pop();
        }

        function drawShield(cx, cy, sz, filled) {
            // Shield: pointed bottom, flat/angled top, rounded shoulders
            let topW = sz * 0.85;
            let r = params.shieldRound * sz * 0.3;

            beginShape();
            // Top-left corner
            vertex(cx - topW * 0.5, cy - sz * 0.65);
            // Shoulder curve left
            bezierVertex(
                cx - topW * 0.5, cy - sz * 0.3,
                cx - topW * 0.45, cy + sz * 0.1,
                cx, cy + sz * 0.85
            );
            // Bottom point to right shoulder
            bezierVertex(
                cx + topW * 0.45, cy + sz * 0.1,
                cx + topW * 0.5, cy - sz * 0.3,
                cx + topW * 0.5, cy - sz * 0.65
            );
            // Top edge
            vertex(cx - topW * 0.5, cy - sz * 0.65);
            endShape(CLOSE);
        }

        function hexWithAlpha(hex, alpha) {
            let c = color(hex);
            return `rgba(${red(c)},${green(c)},${blue(c)},${alpha})`;
        }

        // ── EXPORT ──
        function exportIcon(size) {
            let pg = createGraphics(size, size);
            // Temporarily swap canvas
            let origW = width, origH = height;

            // Render at target size
            let tempCanvas = createGraphics(size, size);
            tempCanvas.pixelDensity(1);

            // Use main canvas approach: resize, render, save, restore
            resizeCanvas(size, size);
            renderIcon();
            saveCanvas('seeker-copilot-icon-' + size, 'png');

            // Restore
            resizeCanvas(origW, origH);
            renderIcon();
        }

        // ── UI HANDLERS ──
        function updateParam(name, value) {
            let num = parseFloat(value);
            params[name] = num;
            document.getElementById(name + '-value').textContent = value;
            renderIcon();
        }

        function updateColor(id, value) {
            if (id === 'colorShield') params.colorShield = value;
            else if (id === 'colorEye') params.colorEye = value;
            else if (id === 'colorBg') params.colorBg = value;
            document.getElementById(id + '-value').textContent = value;
            renderIcon();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                renderIcon();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            renderIcon();
        }

        function nextSeed() {
            params.seed++;
            updateSeedDisplay();
            renderIcon();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            renderIcon();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('shieldPoints').value = params.shieldPoints;
            document.getElementById('shieldPoints-value').textContent = params.shieldPoints;
            document.getElementById('shieldRound').value = params.shieldRound;
            document.getElementById('shieldRound-value').textContent = params.shieldRound;
            document.getElementById('eyeRings').value = params.eyeRings;
            document.getElementById('eyeRings-value').textContent = params.eyeRings;
            document.getElementById('glowIntensity').value = params.glowIntensity;
            document.getElementById('glowIntensity-value').textContent = params.glowIntensity;
            document.getElementById('shieldThickness').value = params.shieldThickness;
            document.getElementById('shieldThickness-value').textContent = params.shieldThickness;
            document.getElementById('spokes').value = params.spokes;
            document.getElementById('spokes-value').textContent = params.spokes;
            document.getElementById('colorShield').value = params.colorShield;
            document.getElementById('colorShield-value').textContent = params.colorShield;
            document.getElementById('colorEye').value = params.colorEye;
            document.getElementById('colorEye-value').textContent = params.colorEye;
            document.getElementById('colorBg').value = params.colorBg;
            document.getElementById('colorBg-value').textContent = params.colorBg;
            updateSeedDisplay();
            renderIcon();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
