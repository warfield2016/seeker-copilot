## Seeker AI Copilot — Solana dApp Store Publishing Config
## Run: npx dapp-store create publisher  (once)
## Run: npx dapp-store create app        (once per app)
## Run: npx dapp-store create release    (every update)
## Run: npx dapp-store publish submit -k <keypair-path> -u https://mainnet.helius-rpc.com/?api-key=<KEY> \
##        --requestor-is-authorized --complies-with-solana-dapp-store-policies

publisher:
  address: "<YOUR_PUBLISHER_WALLET_ADDRESS>"
  name: "Copilot"
  website: "https://github.com/warfield2016/seeker-copilot"
  support_email: "warfield2016@gmail.com"
  ## NOTE: Upload icon directly in Publisher Portal UI — no external URL needed.
  ## If using CLI, host icon at GitHub Pages first:
  ## logo_url: "https://warfield2016.github.io/seeker-copilot/assets/icon-512.png"

app:
  address: ""
  name: "Copilot"
  android_package: "com.seekerai.copilot"
  description: |
    Copilot — Solana portfolio intelligence built for the Seeker phone.

    The only AI-powered portfolio analyzer on the Solana dApp Store.
    Track your entire portfolio, get risk scoring, trade signals,
    and security audits — all from one app.

    ◎ PORTFOLIO TRACKING
    • Full token + NFT inventory via Helius DAS API
    • SKR staked balance detection with yield tracking
    • 24h price changes via Birdeye and CoinGecko
    • Risk score: concentration, volatility, IL, and liquidation metrics
    • 10+ liquid staking tokens auto-detected (mSOL, JitoSOL, bSOL, etc.)
    • Multi-wallet support with bundled portfolio view
    • Interactive allocation pie chart with tap-to-explore

    ✦ AI COPILOT
    • Natural language portfolio Q&A — ask anything about your holdings
    • 5 free AI queries per day for all users
    • Stake 2,000+ SKR to unlock Pro tier: 20 AI queries per day
    • Answers general crypto and Solana questions too

    ⚡ INTELLIGENCE HUB
    • 4 specialized AI agents analyze your portfolio in parallel
    • Trade signals with confidence scoring (buy, sell, hold, rebalance)
    • Market trend intel (momentum, narrative, opportunity, risk)
    • Protocol security scores with audit status
    • Full methodology documentation in "How It Works" tab

    ⬡ SKR UTILITY
    • Stake 2,000+ SKR tokens to unlock Pro tier
    • Pro: 20 AI queries/day (vs 5 free)
    • Direct Seeker token utility — built for the SKR ecosystem

    🔐 SECURITY
    • Never accesses or stores private keys
    • All signing through Seed Vault on your Seeker device
    • All API calls proxied through backend — zero keys in client
    • Watch-only wallets stored locally on device only

    🗺️ ROADMAP
    • In-app token swaps via Jupiter integration
    • Transaction history view
    • Real-time price charts
    • Push notifications for price alerts
    • Portfolio performance tracking with historical data

    ⚠️ Disclaimer: Analysis is for informational purposes only.
    Not financial advice. Always DYOR.

  short_description: "AI portfolio analyzer with risk scoring and trade signals for Solana Seeker"

  ## NOTE: Upload these directly in the Publisher Portal UI.
  ## If using CLI, host at GitHub Pages and update URLs:
  ## icon_url: "https://warfield2016.github.io/seeker-copilot/assets/icon-512.png"
  ## banner_url: "https://warfield2016.github.io/seeker-copilot/assets/banner-1200x600.png"
  ## screenshots uploaded directly in Portal

  categories:
    - "Finance"
    - "DeFi"
  locales:
    - "en-US"
  urls:
    license_url: "https://warfield2016.github.io/seeker-copilot/terms.html"
    copyright_url: "https://warfield2016.github.io/seeker-copilot/terms.html"
    privacy_policy_url: "https://warfield2016.github.io/seeker-copilot/privacy.html"
    website_url: "https://github.com/warfield2016/seeker-copilot"

  testing_instructions: |
    1. On first launch, accept the disclaimer to proceed.
    2. Tap "Connect Wallet" to connect via Seed Vault (Mobile Wallet Adapter).
    3. The portfolio screen loads showing token holdings, NFTs, and risk score.
    4. Tap the wallet address badge to access wallet management (disconnect, add watch wallets).
    5. Tap the Allocation pie chart to see individual token allocations with USD values.
    6. Toggle to Performance to see a simulated chart (clearly labeled "SIMULATED DATA").
    7. Scroll down to see Holdings (including SKR Staked), Collectibles, and Risk Score.
    8. Navigate to Copilot tab — ask "What's my biggest risk?" to test AI Q&A (5 free/day).
    9. Navigate to Intel tab to see AI trade signals, trends, and protocol security scores.
    10. Settings shows SKR Pro tier info, legal links, and Clear App Data option.
    NOTE: AI features require the backend at seeker-copilot-production.up.railway.app.
    NOTE: The app works in demo mode without a connected wallet.

release:
  address: ""
  version: "1.0.0"
  version_code: 2
  apk_url: "" # Set after EAS build completes
  min_sdk_version: 33
  target_sdk_version: 34
  android_permissions:
    - android.permission.INTERNET
    - android.permission.VIBRATE
